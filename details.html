<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動詳情 | 藝境空間</title>
    
    <!-- Open Graph (FB/LINE 社群分享預覽圖與文字預設值) -->
    <meta property="og:title" content="藝境空間 | 精選活動報名">
    <meta property="og:description" content="誠摯邀請您參與我們的精選活動，享受一段美好的藝術與人文時光。立即點擊查看活動詳情與報名資訊！">
    <meta property="og:image" content="https://a3614todoo-ship-it.github.io/event/assets/hero_events_bg.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="藝境空間 Event Hub">

    <link rel="stylesheet" href="details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 返回按鈕組 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <a href="index.html" class="back-link" style="margin-bottom: 0;">
                <i class="fas fa-arrow-left"></i> 返回活動列表
            </a>
            <a href="admin.html" id="adminQuickLink" style="display: none; background: var(--accent); color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; transition: 0.3s;"><i class="fas fa-cog"></i> 進入後台</a>
        </div>

        <div class="event-detail-layout">
            <!-- 左側：詳細資訊 -->
            <div class="detail-main">
                <img id="eventImage" class="detail-img" alt="活動海報" style="opacity: 0; transition: opacity 0.5s ease;">
                <h1 id="eventName" class="event-title">載入中...</h1>
                <div id="eventDescription" class="event-content">
                    正在準備精彩的活動內容，請稍候...
                </div>
                
                <!-- 新增：擴充詳細資訊區塊 -->
                <div id="eventExtendedDetails" style="margin-top: 30px; padding: 25px; background: rgba(253, 251, 247, 0.5); border-radius: 16px; border: 1px solid var(--border-color); display: none;">
                    <h3 style="font-family: 'Noto Serif TC', serif; color: var(--accent); margin-bottom: 15px; font-size: 1.3rem;">活動詳細資訊</h3>
                    <ul id="extDetailsList" style="list-style: none; padding: 0; margin: 0; line-height: 1.8; color: var(--text-main);">
                        <!-- 動態生成自訂欄位 -->
                    </ul>
                </div>
            </div>

            <!-- 右側：報名側邊欄 -->
            <div class="reg-sidebar">
                <div class="reg-card">
                    <ul class="reg-info-list">
                        <li><i class="far fa-calendar-alt"></i> <span id="eventDate">...</span></li>
                        <li><i class="far fa-clock"></i> <span id="eventTime">...</span></li>
                        <li><i class="fas fa-map-marker-alt"></i> <span id="eventLocation">...</span></li>
                        <li><i class="fas fa-users"></i> 報名狀況：<span id="regStatus">載入中</span></li>
                    </ul>

                    <!-- 飢餓行銷：即將額滿提示 -->
                    <div id="urgencyNotice" style="display: none; background: #fef2f2; color: #dc2626; padding: 10px 15px; border-radius: 8px; border: 1px dashed #f87171; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; text-align: center;">
                        <i class="fas fa-fire"></i> <span id="urgencyText">即將額滿！最後剩餘名額</span>
                    </div>

                    <!-- 社群分享按鈕 -->
                    <div style="display: flex; gap: 8px; margin-bottom: 25px; border-top: 1px dashed var(--border-color); padding-top: 15px;">
                        <button onclick="shareToLine()" style="flex: 1; background: #06C755; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: opacity 0.2s;"><i class="fab fa-line"></i> LINE 分享</button>
                        <button onclick="shareToFB()" style="flex: 1; background: #1877F2; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: opacity 0.2s;"><i class="fab fa-facebook-f"></i> FB 分享</button>
                        <button onclick="nativeShareOrCopy()" style="flex: 1; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: opacity 0.2s;"><i class="fab fa-instagram"></i> 更多 / IG</button>
                    </div>

                    <h3 class="form-title">觀眾報名表</h3>
                    <div id="fullNotice" class="full-notice">目前名額已滿，報名將自動進入候補名單。</div>
                    
                    <form id="regForm">
                        <div class="form-group">
                            <label for="userName">真實姓名</label>
                            <input type="text" id="userName" placeholder="請輸入姓名" required>
                        </div>
                        <div class="form-group">
                            <label for="userPhone">聯絡電話</label>
                            <input type="tel" id="userPhone" placeholder="請輸入手機號碼" required>
                        </div>
                        <div class="form-group">
                            <label for="userEmail">電子郵件</label>
                            <input type="email" id="userEmail" placeholder="用於接收報名確認信" required>
                        </div>
                        <div id="dynamicFieldsContainer"></div>
                        
                        <!-- Honeypot field to filter bots. Humans won't see this. -->
                        <div class="hp-field" aria-hidden="true">
                            <label for="userMiddleName">Middle Name</label>
                            <input type="text" id="userMiddleName" name="userMiddleName" tabindex="-1" autocomplete="off">
                        </div>

                        <button type="submit" id="submitBtn" class="btn-submit">確認報名</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功彈窗 (手繪藝術風版) -->
    <div id="successModal" style="display: none; position: fixed; inset: 0; background: rgba(74, 55, 40, 0.4); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #ffffff; border-radius: 40px; max-width: 480px; width: 100%; padding: 30px 40px; text-align: center; box-shadow: 0 40px 100px rgba(74, 55, 40, 0.2); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto;">
            <div style="width: 80px; height: 80px; background: #fdfbf7; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-check" style="color: var(--accent); font-size: 32px;"></i>
            </div>
            <h2 id="successModalTitle" style="color: var(--text-main); margin-bottom: 15px; font-family: 'Noto Serif TC', serif; font-size: 2rem;">報名成功！</h2>
            <p id="successModalDesc" style="color: var(--text-muted); line-height: 1.8; margin-bottom: 25px; font-size: 1.1rem;">感謝您的參與，詳細資訊與報名序號已登錄。<br>系統已發送確認信至您的信箱，請查收。</p>
            
            <!-- QR Code 顯示區域 (僅限正式報名) -->
            <div id="qrCodeContainer" style="display: none; background: #fdfbf7; padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); margin-bottom: 30px; text-align: center;">
                <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
                <p style="font-size: 0.85rem; color: var(--accent); font-weight: bold; margin: 0;">您的專屬報到 QR Code</p>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">活動當天請出示此碼以完成快速報到</p>
            </div>

            <!-- 加入行事曆按鈕組 -->
            <div id="calendarButtons" style="display: none; margin-bottom: 30px; border-top: 1px solid var(--border); padding-top: 25px;">
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">將活動加入您的行事曆：</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btnGoogleCal" class="btn-calendar" style="flex: 1; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 12px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <img src="https://www.gstatic.com/images/branding/product/1x/calendar_2020q4_48dp.png" width="18" alt="Google"> Google
                    </button>
                    <button id="btnICal" class="btn-calendar" style="flex: 1; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 12px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="far fa-calendar-plus" style="color: #4285f4; font-size: 18px;"></i> Apple / Outlook
                    </button>
                </div>
            </div>

            <!-- 分享按鈕組 (報名成功專用) -->
            <div id="shareButtons" style="margin-bottom: 25px; border-top: 1px dashed var(--border); padding-top: 20px;">
                <p style="font-size: 0.9rem; color: var(--accent); margin-bottom: 12px; font-weight: bold;">邀請好友一起來！</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button onclick="shareToLine()" style="flex: 1; padding: 10px; background: #06C755; border: none; border-radius: 12px; color: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;"><i class="fab fa-line" style="font-size: 1.1rem;"></i> LINE</button>
                    <button onclick="shareToFB()" style="flex: 1; padding: 10px; background: #1877F2; border: none; border-radius: 12px; color: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;"><i class="fab fa-facebook-f" style="font-size: 1.1rem;"></i> FB 分享</button>
                    <button onclick="nativeShareOrCopy()" style="flex: 1; padding: 10px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); border: none; border-radius: 12px; color: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;"><i class="fab fa-instagram" style="font-size: 1.1rem;"></i> 更多 / IG</button>
                </div>
            </div>

            <button onclick="closeSuccessModal()" style="width: 100%; padding: 18px; background: var(--text-main); border: none; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1.1rem;">
                返回活動列表
            </button>
        </div>
    </div>

    <script src="events.js"></script>
</body>
</html>
