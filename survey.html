<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動滿意度調查 | 藝境空間</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; }
        .survey-container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 50px; border-radius: 40px; box-shadow: 0 40px 100px rgba(74, 55, 40, 0.1); border: 1px solid var(--border); }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin: 20px 0; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.5rem; color: #ddd; cursor: pointer; transition: 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: var(--accent); }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--text-main); }
        textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #fdfbf7; font-size: 1rem; resize: vertical; min-height: 100px; }
        .btn-submit { background: var(--text-main); color: white; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74, 55, 40, 0.2); }
    </style>
</head>
<body>

    <div class="survey-container" id="surveyBox">
        <div id="loadingState" style="text-align: center;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--accent);"></i>
            <p style="margin-top: 20px;">載入問卷中...</p>
        </div>

        <div id="formState" style="display: none; text-align: center;">
            <h1 style="font-family: 'Noto Serif TC', serif; font-size: 2rem; margin-bottom: 10px;">活動回饋</h1>
            <p id="eventName" style="color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 30px;">載入中...</p>
            
            <form id="surveyForm">
                <div class="form-group" style="text-align: center;">
                    <label>您對本次活動的整體滿意度？</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" required><label for="star5" title="5 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 stars"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 star"><i class="fas fa-star"></i></label>
                    </div>
                </div>

                <div class="form-group">
                    <label>您最喜歡活動的哪個部分？</label>
                    <textarea id="favoritePart" placeholder="例如：講師的講解、實作環節、藝術氛圍..."></textarea>
                </div>

                <div class="form-group">
                    <label>其他建議或想對我們說的話？</label>
                    <textarea id="suggestions" placeholder="您的寶貴意見是我們進步的動力"></textarea>
                </div>

                <div class="form-group">
                    <label>是否願意將此活動推薦給朋友？</label>
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
                            <input type="radio" name="recommend" value="yes" checked> 非常願意
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
                            <input type="radio" name="recommend" value="no"> 再考慮看看
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-submit">提交回饋</button>
            </form>
        </div>

        <div id="successState" style="display: none; text-align: center;">
            <div style="width: 80px; height: 80px; background: #f0fdf4; border: 2px solid #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                <i class="fas fa-heart" style="color: #22c55e; font-size: 32px;"></i>
            </div>
            <h1 style="font-family: 'Noto Serif TC', serif; font-size: 2rem; margin-bottom: 15px;">感謝您的回饋！</h1>
            <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 30px;">您的寶貴意見已成功送出。我們將會認真參考，期待下次再見！</p>
            <button onclick="location.href='index.html'" class="btn-primary" style="padding: 15px 40px; border-radius: 50px;">返回首頁</button>
        </div>

        <div id="errorState" style="display: none; text-align: center;">
            <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #f59e0b; margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Noto Serif TC', serif;">連結無效</h2>
            <p id="errorMsg" style="color: var(--text-muted); margin-bottom: 30px;">找不到對應的活動紀錄，或問卷已填寫完畢。</p>
            <button onclick="location.href='index.html'" class="btn-secondary" style="padding: 12px 30px; border-radius: 50px;">返回首頁</button>
        </div>
    </div>

    <script src="survey.js"></script>
</body>
</html>
