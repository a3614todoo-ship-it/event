<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藝境空間 | 藝術與空間的活動報名系統</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: 襯線體更符合藝術氣息 -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <!-- FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- 導航列 -->
    <nav class="navbar">
        <div class="nav-content container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" style="margin: 0;">藝境空間 ‧ <span style="font-weight: 300;">活動報名</span></div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <ul class="nav-links" style="margin: 0;">
                    <li><a href="#" class="active">當期活動</a></li>
                    <li><a href="#about">關於我們</a></li>
                </ul>
                <a href="admin.html" id="adminQuickLink"
                    style="display: none; background: var(--accent); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; transition: 0.3s;"><i
                        class="fas fa-cog"></i> 進入後台</a>
            </div>
        </div>
    </nav>

    <!-- Hero 區塊 (手繪風) -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>探索舞台的無限可能</h1>
            <p>從大師講座到專業工作坊，為您的藝術之路注入靈魂。</p>
        </div>
    </header>

    <!-- 熱門活動區塊 -->
    <section id="popularEventsSection" class="container" style="display: none; margin-top: 50px;">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <h2 style="font-family: 'Noto Serif TC', serif; font-size: 2rem; margin: 0;">熱門活動特選</h2>
            <span style="background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px;"><i class="fas fa-fire"></i> TRENDING</span>
        </div>
        <div id="popularEventsGrid" class="event-grid" style="grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); margin-bottom: 60px;">
            <!-- 動態注入熱門活動 -->
        </div>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 50px;">
    </section>

    <!-- 搜尋區塊 -->
    <section class="search-container">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="eventSearch" placeholder="搜尋想參加的藝術活動...">
        </div>
    </section>

    <!-- 當期活動列表 -->
    <main id="active-events" class="container">
        <div class="section-title-wrapper" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div class="section-title">
                <h2>所有活動</h2>
                <p>探索更多藝術的可能性</p>
            </div>
            <div class="view-toggle" style="display: flex; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 50px;">
                <button id="listViewBtn" class="toggle-btn active" style="padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; background: var(--text-main); color: white; font-weight: 500;">
                    <i class="fas fa-list"></i> 列表
                </button>
                <button id="calendarViewBtn" class="toggle-btn" style="padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); font-weight: 500;">
                    <i class="fas fa-calendar-alt"></i> 月曆
                </button>
            </div>
        </div>

        <!-- 月曆視圖容器 -->
        <div id="calendarView" style="display: none; background: #ffffff; padding: 30px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.05); margin-bottom: 50px;"></div>

        <div id="eventGrid" class="event-grid">
            <!-- 動態注入活動卡片 -->
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 15px;"></i>
                <p>正在載入精彩活動...</p>
            </div>
        </div>
    </main>

    <!-- 關於我們區塊 -->
    <section id="about" class="about-section">
        <div class="container">
            <div class="about-card">
                <div class="about-img">
                    <img src="assets/about_bg.png" alt="關於藝境">
                </div>
                <div class="about-info">
                    <h3 style="font-size: 2.2rem; line-height: 1.4;">藝境空間｜<br><span
                            style="font-weight: 300;">為創作而存在的活動報名系統</span></h3>
                    <p style="margin-top: 20px;">創作者的時間，應該留給靈感，而不是行政。</p>
                    <p style="font-weight: 700; color: var(--text-main); margin-top: 30px; font-size: 1.3rem;">
                        這套活動報名系統的存在，只為一件事——<br>讓藝術家專心創作，其餘交給系統。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer>
        <div class="container">
            <div style="font-family: 'Noto Serif TC', serif; font-size: 1.5rem; margin-bottom: 20px;">藝境空間</div>
            <p>&copy; 2026 Space. All Rights Reserved.</p>
            <div style="margin-top: 20px; display: flex; justify-content: center; gap: 20px; font-size: 1.2rem;">
                <a href="#" style="color: var(--text-muted);"><i class="fab fa-facebook"></i></a>
                <a href="#" style="color: var(--text-muted);"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: var(--text-muted);"><i class="fas fa-envelope"></i></a>
                <a href="admin.html"
                    style="color: var(--text-muted); font-size: 0.9rem; align-self: flex-end; margin-left: 20px; text-decoration: none;"><i
                        class="fas fa-cog"></i> 管理員登入</a>
            </div>
        </div>
    </footer>

    <script src="events_hub.js"></script>
    <script>
        // 簡單的搜尋監聽同步至 events_hub.js
        document.getElementById('eventSearch').addEventListener('input', (e) => {
            if (window.filterEvents) window.filterEvents(e.target.value);
        });
    </script>
</body>

</html>
